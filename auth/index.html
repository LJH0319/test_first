<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册</title>
    <!-- 引入css 和图标图的css  引入才可以生效 -->
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="stylesheet" href="./assets/iconfont/iconfont.css">
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form action="#" onsubmit="register(event)" id="registerForm">
                <h1>用户注册</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="iconfont icon-qq"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-weixin"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-weibo-copy"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-github"></i></a>
                </div>
                <span>您可以选择以上几种方式注册一个您的账户!</span>
                <input type="text" id="regUsername" placeholder="用户名">
                <input type="password" id="regPwd" placeholder="密码">
                <input type="email" id="regEmail" placeholder="邮箱">
                <button type="button" id="send_code">发送验证码</button>
                <span id="codeBox" style="border:1px solid #ccc;
                padding:5px 10px; margin-left:10px; cursor:pointer;"></span>
                <input type="text" autocomplete="off" id="verifyInput" placeholder="请输入验证码">
                <button>注册</button>
            </form>
        </div>
        <div class="form-container log-in-container" >
        <!-- 登录 -->
         <form action="#" onsubmit="checkLogin(event)">
            <h1>用户登陆</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="iconfont icon-qq"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-weixin"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-weibo-copy"></i></a>
                    <a href="#" class="social"><i class="iconfont icon-github"></i></a>
                </div>
                <span>您可以选择以上几种方式登录!</span>
                <input type="text" id="name" placeholder="用户名" required>
                <input type="password" id="password" placeholder="密码" required>
                <a href="#">忘记密码?</a>
                <button type="submit">登录</button>
         </form>
    </div>
    <!-- 侧边栏内容 -->
     <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-pannel overlay-left">
                <h1>已有帐号？</h1>
                <p>点我去进行登录吧。</p>
                <button class="ghost" id="signIn">登录</button>
            </div>
            <div class="overlay-pannel overlay-right">
                <h1>没有帐号？</h1>
                <p>点击注册去注册一个属于你的账号吧。</p>
                <button class="ghost" id="signUp">注册</button>
            </div>
        </div>
     </div>
    </div>
</body>
<script src="./index.js"></script>
</html>
